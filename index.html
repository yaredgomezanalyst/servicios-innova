<style>
  :root{
    --paper:#F3F5F2;
    --card:#FCFDFB;
    --ink:#1E2A2B;
    --ink-soft:#5A6A69;
    --line:#E1E6E0;
    --line-strong:#CBD3CC;
    --accent:#0E6E6B;
    --accent-soft:#E2EFEE;

    /* colores por trabajadora (deben distinguirse de un vistazo) */
    --c-mar:#0E7C7B;
    --c-mar-bg:#DCEEEE;
    --c-gema:#C2611E;
    --c-gema-bg:#F7E6D6;
    --c-vic:#6D5BA6;
    --c-vic-bg:#E8E3F3;

    --ok:#2E7D52;
    --warn:#B4541A;
    --danger:#B23A3A;
    --radius:14px;
    --radius-sm:9px;
    --shadow:0 1px 2px rgba(30,42,43,.05), 0 6px 24px rgba(30,42,43,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  #root{min-height:100vh}
  h1,h2,h3{font-family:'Spectral',Georgia,serif; font-weight:600; margin:0; letter-spacing:-.01em}
  button{font-family:inherit; cursor:pointer}
  input,select{font-family:inherit; font-size:14px}

  .wrap{max-width:1120px; margin:0 auto; padding:0 20px}

  /* top bar */
  .topbar{border-bottom:1px solid var(--line); background:var(--card)}
  .topbar-inner{display:flex; align-items:center; justify-content:space-between; padding:16px 0; gap:16px}
  .brand{display:flex; align-items:center; gap:14px}
  .logo{height:38px; width:auto; display:block}
  .brand h1{font-size:21px}
  .brand .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); font-family:'Inter'; font-weight:600}
  .mode-badge{font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; letter-spacing:.04em}
  .mode-demo{background:#FBEFD6; color:#8a5a12}
  .mode-real{background:var(--accent-soft); color:var(--accent)}

  .tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); background:var(--card)}
  .tabs .wrap{display:flex; gap:4px}
  .tab{background:none; border:none; padding:14px 4px; margin-right:24px; font-size:14px; font-weight:600;
       color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-1px}
  .tab.active{color:var(--ink); border-bottom-color:var(--accent)}

  .page{padding:28px 0 64px}

  /* generic card */
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
  .card-pad{padding:20px}

  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center}
  .spread{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap}
  .muted{color:var(--ink-soft)}
  .small{font-size:13px}
  .tiny{font-size:11.5px}

  /* buttons */
  .btn{border:1px solid var(--line-strong); background:var(--card); color:var(--ink);
       padding:9px 14px; border-radius:var(--radius-sm); font-size:13.5px; font-weight:600; transition:.12s}
  .btn:hover{border-color:var(--accent); color:var(--accent)}
  .btn-primary{background:var(--accent); color:#fff; border-color:var(--accent)}
  .btn-primary:hover{filter:brightness(.93); color:#fff}
  .btn-ghost{border-color:transparent; padding:6px 10px; color:var(--ink-soft)}
  .btn-ghost:hover{background:var(--paper); color:var(--ink)}
  .btn-sm{padding:6px 10px; font-size:12.5px}
  .btn-danger:hover{border-color:var(--danger); color:var(--danger)}

  /* form fields */
  .field{display:flex; flex-direction:column; gap:5px}
  .field label{font-size:11.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft)}
  .field input,.field select{border:1px solid var(--line-strong); border-radius:var(--radius-sm); padding:9px 11px; background:#fff; color:var(--ink)}
  .field textarea{border:1px solid var(--line-strong); border-radius:var(--radius-sm); padding:9px 11px; background:#fff; color:var(--ink); font-family:inherit; font-size:14px; resize:vertical; line-height:1.5}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .ficha-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:6px}

  /* CALENDAR */
  .cal-head{display:flex; align-items:center; gap:14px}
  .cal-title{font-size:19px; text-transform:capitalize}
  .legend{display:flex; gap:14px; flex-wrap:wrap}
  .legend-item{display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600}
  .dot{width:11px; height:11px; border-radius:50%; flex:none}
  .legend-count{background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:1px 8px; font-size:12px; color:var(--ink-soft); font-weight:600}

  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
  .dow{background:var(--card); padding:9px 10px; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); text-align:left}
  .cell{background:var(--card); min-height:104px; padding:7px 8px; display:flex; flex-direction:column; gap:4px; cursor:pointer; transition:.1s}
  .cell:hover{background:#fff}
  .cell.out{background:var(--paper)}
  .cell.today .daynum{background:var(--accent); color:#fff}
  .daynum{font-size:12.5px; font-weight:600; width:23px; height:23px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:var(--ink-soft)}
  .chip{font-size:11.5px; font-weight:600; padding:3px 7px; border-radius:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-left:3px solid}

  /* SERVICES */
  .usuaria-list{display:flex; flex-direction:column; gap:8px}
  .usuaria-btn{text-align:left; width:100%; border:1px solid var(--line); background:var(--card); border-radius:var(--radius-sm); padding:12px 14px; transition:.1s}
  .usuaria-btn:hover{border-color:var(--line-strong)}
  .usuaria-btn.active{border-color:var(--accent); background:var(--accent-soft)}
  .usuaria-btn .nm{font-weight:600; font-size:14.5px}

  .svc{border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:16px}
  .svc-head{padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap}
  .svc-name{font-family:'Spectral'; font-size:17px; font-weight:600}
  .meter{height:8px; background:var(--line); border-radius:999px; overflow:hidden; margin-top:8px}
  .meter > div{height:100%; border-radius:999px}
  .svc-stats{display:flex; gap:18px; font-size:13px}
  .svc-stats b{font-family:'Spectral'; font-size:16px; font-weight:600}

  table.sess{width:100%; border-collapse:collapse; font-size:13px}
  table.sess th{text-align:left; font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; padding:8px 14px; border-top:1px solid var(--line); background:var(--paper)}
  table.sess td{padding:9px 14px; border-top:1px solid var(--line)}
  .pill{font-size:11.5px; font-weight:600; padding:2px 9px; border-radius:999px}
  .pill-yes{background:#E1F0E7; color:var(--ok)}
  .pill-no{background:#F7E3D6; color:var(--warn)}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(30,42,43,.32); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50}
  .modal{background:var(--card); border-radius:var(--radius); box-shadow:0 20px 60px rgba(30,42,43,.25); width:100%; max-width:460px; max-height:90vh; overflow:auto}
  .modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between}
  .modal-body{padding:22px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}

  .empty{text-align:center; padding:40px 20px; color:var(--ink-soft)}
  .checkline{display:flex; align-items:center; gap:9px; font-size:14px; font-weight:500}
  .checkline input{width:17px; height:17px; accent-color:var(--accent)}

  /* login */
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px}
  .login-card{width:100%; max-width:380px}

  /* DASHBOARD */
  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow)}
  .kpi .label{font-size:11.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); font-weight:600}
  .kpi .val{font-family:'Spectral'; font-size:29px; font-weight:600; margin-top:7px; line-height:1}
  .kpi .accent-bar{height:3px; width:32px; border-radius:2px; margin-top:13px}

  .dash-cols{display:grid; grid-template-columns:1fr 1fr; gap:18px}
  .chart-card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; margin-bottom:18px}
  .chart-card h3{font-size:16px; margin-bottom:2px}

  .hbar-row{display:flex; align-items:center; gap:12px; margin:13px 0}
  .hbar-label{width:104px; font-size:13px; font-weight:600; flex:none; text-align:right; line-height:1.2}
  .hbar-track{flex:1; height:26px; background:var(--paper); border-radius:7px; overflow:hidden; display:flex}
  .hbar-seg{height:100%; transition:width .5s cubic-bezier(.2,.7,.3,1)}
  .hbar-val{width:110px; flex:none; font-size:13px}

  .vbars{display:flex; align-items:flex-end; gap:14px; height:172px; padding-top:24px; border-bottom:1px solid var(--line)}
  .vbar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:7px; height:100%; justify-content:flex-end}
  .vbar{width:70%; max-width:48px; min-height:3px; border-radius:7px 7px 0 0; background:var(--accent); transition:height .5s}
  .vbar-x{font-size:11.5px; color:var(--ink-soft); text-transform:capitalize}

  .tip-host{position:relative}
  .tip{position:absolute; bottom:calc(100% + 9px); left:50%; transform:translateX(-50%);
       background:var(--ink); color:#fff; font-size:12px; font-weight:600; padding:6px 9px; border-radius:7px; white-space:nowrap;
       opacity:0; pointer-events:none; transition:.12s; z-index:5}
  .tip-host:hover .tip{opacity:1}
  .tip::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--ink)}

  .legend-toggle{display:flex; gap:16px; margin-top:14px}
  .lt{display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; cursor:pointer; user-select:none}
  .lt .sq{width:11px; height:11px; border-radius:3px}

  @media(max-width:720px){
    .cell{min-height:78px}
    .grid2{grid-template-columns:1fr}
    .sidebar-cols{grid-template-columns:1fr !important}
    .ficha-grid{grid-template-columns:1fr}
    .kpis{grid-template-columns:1fr 1fr}
    .dash-cols{grid-template-columns:1fr}
  }
  .sidebar-cols{display:grid; grid-template-columns:280px 1fr; gap:24px; align-items:start}
</style>
</head>

/* ───────────────── Utilidades de fecha ───────────────── */
const hoyStr = () => {
  const d = new Date(); const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
};
const fmtFecha = (iso) => { // YYYY-MM-DD -> DD/MM/YYYY
  if(!iso) return "—"; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`;
};
const mesAnio = (iso) => {
  if(!iso) return "—";
  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const [y,m]=iso.split("-"); return `${meses[parseInt(m,10)-1]} ${y}`;
};
const uid = () => Math.random().toString(36).slice(2,10);
const fmtEur = (n) => (Number(n)||0).toLocaleString("es-ES",{style:"currency",currency:"EUR",minimumFractionDigits:0,maximumFractionDigits:2});

/* ───────────────── Exportar a Excel ───────────────── */
function exportarExcel(data){
  if(!window.XLSX){ alert("El componente de Excel aún se está cargando. Espera un segundo y vuelve a intentarlo."); return; }
  const nombreU = id => (data.usuarias.find(u=>u.id===id)||{}).nombre || "—";
  const sn = b => b ? "Sí" : "No";

  const hUsuarias = data.usuarias.map(u=>({
    "Usuaria": u.nombre,
    "Nº de cuenta": u.numero_cuenta||"",
    "Discapacidad reconocida": sn(u.discapacidad),
    "Inserción laboral (trabajando)": sn(u.trabajando),
    "Dónde / detalles": u.trabajo_donde||"",
    "Observaciones": u.observaciones||"",
  }));
  const hHoras = data.sesiones.map(s=>({
    "Usuaria": nombreU(s.usuaria_id),
    "Servicio": svcById(s.tipo).label,
    "Horas": Number(s.horas||0),
    "€/hora": Number(s.tarifa||0),
    "Importe (€)": Number(s.horas||0)*Number(s.tarifa||0),
    "Fecha": fmtFecha(s.fecha),
    "Facturado": sn(s.facturado),
    "Fecha facturación": s.facturado?fmtFecha(s.fecha_facturacion):"",
    "Doc. subida a STO": sn(s.doc_subida),
    "Fecha doc. STO": s.doc_subida?fmtFecha(s.doc_fecha):"",
    "Trabajadora": traById(s.trabajadora_id).nombre,
  }));
  const hBecas = data.ayudas.map(a=>({
    "Usuaria": nombreU(a.usuaria_id),
    "Beca": becaById(a.tipo).label,
    "Concepto": a.concepto||"",
    "Importe (€)": Number(a.importe||0),
    "Fecha": fmtFecha(a.fecha),
    "Facturado": sn(a.facturado),
    "Fecha facturación": a.facturado?fmtFecha(a.fecha_facturacion):"",
    "Doc. subida a STO": sn(a.doc_subida),
    "Fecha doc. STO": a.doc_subida?fmtFecha(a.doc_fecha):"",
  }));
  const hCitas = data.citas.map(c=>({
    "Trabajadora": traById(c.trabajadora_id).nombre,
    "Usuaria": c.usuaria,
    "Fecha": fmtFecha(c.fecha),
    "Hora": c.hora_inicio||"",
    "Servicio": svcById(c.servicio).label,
    "Nota": c.nota||"",
  }));

  const wb = XLSX.utils.book_new();
  const add = (rows, nombre, vacio) => XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[vacio]), nombre);
  add(hUsuarias, "Usuarias", {"Usuaria":""});
  add(hHoras, "Horas y facturación", {"Usuaria":""});
  add(hBecas, "Becas", {"Usuaria":""});
  add(hCitas, "Citas", {"Trabajadora":""});
  XLSX.writeFile(wb, `servicios-vg_${hoyStr()}.xlsx`);
}

/* ════════════════════════════════════════════════════════════
   APP
   ════════════════════════════════════════════════════════════ */
function App(){
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(!SUPA_OK);

  useEffect(() => {
    if(!SUPA_OK) return;
    supa.auth.getSession().then(({data}) => { setSession(data.session); setAuthReady(true); });
    const { data:sub } = supa.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if(SUPA_OK && !authReady) return <div className="empty">Cargando…</div>;
  if(SUPA_OK && !session) return <Login />;
  return <Main session={session} />;
}

/* ───────────────── Login (solo modo real) ───────────────── */
function Login(){
  const [email,setEmail]=useState(""); const [pass,setPass]=useState("");
  const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  async function entrar(){
    setBusy(true); setErr("");
    const { error } = await supa.auth.signInWithPassword({ email, password:pass });
    if(error) setErr("No se ha podido entrar. Revisa el correo y la contraseña.");
    setBusy(false);
  }
  return (
    <div className="login-wrap">
      <div className="card card-pad login-card">
        <img className="logo" src={LOGO_SRC} alt="Innova Humana" style={{height:42,marginBottom:18}} />
        <div className="eyebrow" style={{fontSize:11,letterSpacing:".14em",textTransform:"uppercase",color:"var(--ink-soft)",fontWeight:600}}>Acceso interno</div>
        <h1 style={{fontSize:22,margin:"6px 0 18px"}}>Gestión de servicios</h1>
        <div className="field" style={{marginBottom:12}}>
          <label>Correo</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entrar()} />
        </div>
        <div className="field" style={{marginBottom:16}}>
          <label>Contraseña</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entrar()} />
        </div>
        {err && <div className="small" style={{color:"var(--danger)",marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary" style={{width:"100%"}} disabled={busy} onClick={entrar}>{busy?"Entrando…":"Entrar"}</button>
      </div>
    </div>
  );
}

/* ───────────────── Pantalla principal ───────────────── */
function Main({ session }){
  const [tab,setTab]=useState("calendario");
  const [data,setData]=useState({usuarias:[],sesiones:[],citas:[],ayudas:[]});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{ cargar(); },[]);

  async function cargar(){
    setLoading(true);
    if(!SUPA_OK){ setData(datosDemo()); setLoading(false); return; }
    const [u,s,c,a] = await Promise.all([
      supa.from("usuarias").select("*").order("nombre"),
      supa.from("sesiones").select("*").order("fecha",{ascending:false}),
      supa.from("citas").select("*").order("fecha"),
      supa.from("ayudas").select("*").order("fecha",{ascending:false}),
    ]);
    setData({ usuarias:u.data||[], sesiones:s.data||[], citas:c.data||[], ayudas:a.data||[] });
    setLoading(false);
  }

  /* mutaciones: en demo solo tocan estado; en real escriben en Supabase y recargan */
  async function addCita(c){
    if(!SUPA_OK){ setData(d=>({...d, citas:[...d.citas,{...c,id:uid()}]})); return; }
    await supa.from("citas").insert(c); cargar();
  }
  async function delCita(id){
    if(!SUPA_OK){ setData(d=>({...d, citas:d.citas.filter(x=>x.id!==id)})); return; }
    await supa.from("citas").delete().eq("id",id); cargar();
  }
  async function addUsuaria(nombre){
    if(!SUPA_OK){ const nu={id:uid(),nombre}; setData(d=>({...d, usuarias:[...d.usuarias,nu]})); return nu.id; }
    const { data:r } = await supa.from("usuarias").insert({nombre}).select().single(); cargar(); return r?.id;
  }
  async function addSesion(s){
    if(!SUPA_OK){ setData(d=>({...d, sesiones:[{...s,id:uid()},...d.sesiones]})); return; }
    await supa.from("sesiones").insert(s); cargar();
  }
  async function updSesion(id,patch){
    if(!SUPA_OK){ setData(d=>({...d, sesiones:d.sesiones.map(x=>x.id===id?{...x,...patch}:x)})); return; }
    await supa.from("sesiones").update(patch).eq("id",id); cargar();
  }
  async function delSesion(id){
    if(!SUPA_OK){ setData(d=>({...d, sesiones:d.sesiones.filter(x=>x.id!==id)})); return; }
    await supa.from("sesiones").delete().eq("id",id); cargar();
  }
  async function updUsuaria(id,patch){
    if(!SUPA_OK){ setData(d=>({...d, usuarias:d.usuarias.map(x=>x.id===id?{...x,...patch}:x)})); return; }
    await supa.from("usuarias").update(patch).eq("id",id); cargar();
  }
  async function addAyuda(a){
    if(!SUPA_OK){ setData(d=>({...d, ayudas:[{...a,id:uid()},...d.ayudas]})); return; }
    await supa.from("ayudas").insert(a); cargar();
  }
  async function delAyuda(id){
    if(!SUPA_OK){ setData(d=>({...d, ayudas:d.ayudas.filter(x=>x.id!==id)})); return; }
    await supa.from("ayudas").delete().eq("id",id); cargar();
  }
  async function updAyuda(id,patch){
    if(!SUPA_OK){ setData(d=>({...d, ayudas:d.ayudas.map(x=>x.id===id?{...x,...patch}:x)})); return; }
    await supa.from("ayudas").update(patch).eq("id",id); cargar();
  }
  async function delUsuaria(id){
    if(!SUPA_OK){ setData(d=>({...d, usuarias:d.usuarias.filter(x=>x.id!==id), sesiones:d.sesiones.filter(x=>x.usuaria_id!==id), ayudas:d.ayudas.filter(x=>x.usuaria_id!==id)})); return; }
    await supa.from("usuarias").delete().eq("id",id); cargar();
  }

  return (
    <div>
      <div className="topbar"><div className="wrap topbar-inner">
        <div className="brand">
          <img className="logo" src={LOGO_SRC} alt="Innova Humana" />
          <div>
            <div className="eyebrow">Servicio de atención · VG</div>
            <h1>Gestión de servicios</h1>
          </div>
          <span className={"mode-badge "+(SUPA_OK?"mode-real":"mode-demo")}>{SUPA_OK?"Conectado":"Modo demo"}</span>
        </div>
        <div className="row" style={{gap:10}}>
          <button className="btn btn-sm" onClick={()=>exportarExcel(data)}>⤓ Exportar a Excel</button>
          {SUPA_OK
            ? <button className="btn btn-sm" onClick={()=>supa.auth.signOut()}>Salir</button>
            : <span className="tiny muted">Modo demo · nada se guarda</span>}
        </div>
      </div></div>

      <div className="tabs"><div className="wrap" style={{display:"flex"}}>
        <button className={"tab"+(tab==="resumen"?" active":"")} onClick={()=>setTab("resumen")}>Resumen</button>
        <button className={"tab"+(tab==="calendario"?" active":"")} onClick={()=>setTab("calendario")}>Calendario</button>
        <button className={"tab"+(tab==="servicios"?" active":"")} onClick={()=>setTab("servicios")}>Servicios</button>
      </div></div>

      <div className="wrap page">
        {loading
          ? <div className="empty">Cargando…</div>
          : tab==="resumen"
            ? <Resumen data={data} />
            : tab==="calendario"
            ? <Calendario citas={data.citas} onAdd={addCita} onDel={delCita} />
            : <Servicios data={data} addUsuaria={addUsuaria} addSesion={addSesion} updSesion={updSesion} delSesion={delSesion} updUsuaria={updUsuaria} addAyuda={addAyuda} delAyuda={delAyuda} updAyuda={updAyuda} delUsuaria={delUsuaria} />
        }
      </div>
    </div>
  );
}

/* ════════════════════════ CALENDARIO ════════════════════════ */
function Calendario({ citas, onAdd, onDel }){
  const [cursor,setCursor]=useState(()=>{ const d=new Date(); return {y:d.getFullYear(), m:d.getMonth()}; });
  const [filtro,setFiltro]=useState("all");
  const [modal,setModal]=useState(null); // {fecha} para nueva cita
  const [dia,setDia]=useState(null);     // {fecha} para ver todas las citas del día

  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const prefijoMes = `${cursor.y}-${String(cursor.m+1).padStart(2,"0")}`;
  const citasMes = citas.filter(c => c.fecha?.startsWith(prefijoMes));

  const conteo = useMemo(()=>{
    const o={}; TRABAJADORAS.forEach(t=>o[t.id]=0);
    citasMes.forEach(c=>{ if(o[c.trabajadora_id]!=null) o[c.trabajadora_id]++; });
    return o;
  },[citasMes]);

  // construir rejilla (lunes a domingo)
  const primero=new Date(cursor.y,cursor.m,1);
  let offset=primero.getDay()-1; if(offset<0) offset=6; // lunes=0
  const diasMes=new Date(cursor.y,cursor.m+1,0).getDate();
  const celdas=[];
  for(let i=0;i<offset;i++) celdas.push(null);
  for(let d=1;d<=diasMes;d++) celdas.push(d);
  while(celdas.length%7!==0) celdas.push(null);

  const citasPorDia = useMemo(()=>{
    const o={};
    citasMes.filter(c=>filtro==="all"||c.trabajadora_id===filtro).forEach(c=>{
      const dia=parseInt(c.fecha.split("-")[2],10);
      (o[dia]=o[dia]||[]).push(c);
    });
    Object.values(o).forEach(arr=>arr.sort((a,b)=>(a.hora_inicio||"").localeCompare(b.hora_inicio||"")));
    return o;
  },[citasMes,filtro]);

  const mover=(n)=>setCursor(c=>{ let m=c.m+n,y=c.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} return {y,m}; });

  return (
    <div>
      <div className="card card-pad" style={{marginBottom:18}}>
        <div className="spread">
          <div className="cal-head">
            <button className="btn btn-sm" onClick={()=>mover(-1)}>←</button>
            <h2 className="cal-title">{meses[cursor.m]} {cursor.y}</h2>
            <button className="btn btn-sm" onClick={()=>mover(1)}>→</button>
            <button className="btn-ghost btn small" onClick={()=>{const d=new Date();setCursor({y:d.getFullYear(),m:d.getMonth()});}}>Hoy</button>
          </div>
          <button className="btn btn-primary btn-sm" onClick={()=>setModal({fecha:hoyStr()})}>+ Nueva cita</button>
        </div>
        <div className="legend" style={{marginTop:16}}>
          <button className={"legend-item btn-ghost"} style={{opacity:filtro==="all"?1:.45}} onClick={()=>setFiltro("all")}>
            <span className="dot" style={{background:"var(--ink-soft)"}}></span>Todas
          </button>
          {TRABAJADORAS.map(t=>(
            <button key={t.id} className="legend-item btn-ghost" style={{opacity:filtro==="all"||filtro===t.id?1:.4}}
                    onClick={()=>setFiltro(filtro===t.id?"all":t.id)}>
              <span className="dot" style={{background:t.color}}></span>{t.nombre}
              <span className="legend-count">{conteo[t.id]}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="grid">
        {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d=><div key={d} className="dow">{d}</div>)}
        {celdas.map((d,i)=>{
          if(d===null) return <div key={i} className="cell out"></div>;
          const fecha=`${prefijoMes}-${String(d).padStart(2,"0")}`;
          const esHoy=fecha===hoyStr();
          const items=citasPorDia[d]||[];
          return (
            <div key={i} className={"cell"+(esHoy?" today":"")} onClick={()=>setDia({fecha})}>
              <span className="daynum">{d}</span>
              {items.slice(0,4).map(c=>{
                const t=traById(c.trabajadora_id);
                return <div key={c.id} className="chip" title={`${c.hora_inicio||""} ${c.usuaria} · ${t.nombre}`}
                            style={{background:t.bg,color:t.color,borderLeftColor:t.color}}>
                  {c.hora_inicio?c.hora_inicio+" ":""}{c.usuaria}
                </div>;
              })}
              {items.length>4 && <span className="tiny" style={{color:"var(--accent)",fontWeight:700}}>+{items.length-4} más →</span>}
            </div>
          );
        })}
      </div>
      <p className="tiny muted" style={{marginTop:10}}>Toca un día para ver y gestionar todas sus citas · los números junto a cada nombre son las citas de ese mes.</p>

      {modal && <ModalCita fecha={modal.fecha} onClose={()=>setModal(null)} onSave={(c)=>{onAdd(c); setModal(null);}} />}
      {dia && <ModalDia fecha={dia.fecha}
                citas={citas.filter(c=>c.fecha===dia.fecha).sort((a,b)=>(a.hora_inicio||"").localeCompare(b.hora_inicio||""))}
                onDel={onDel}
                onAdd={(fecha)=>{ setDia(null); setModal({fecha}); }}
                onClose={()=>setDia(null)} />}
    </div>
  );
}

function ModalDia({ fecha, citas, onDel, onAdd, onClose }){
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2 style={{fontSize:18}}>Citas del {fmtFecha(fecha)}</h2>
          <button className="btn-ghost btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {citas.length===0
            ? <p className="small muted" style={{marginBottom:16}}>No hay citas este día.</p>
            : <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {citas.map(c=>{
                  const t=traById(c.trabajadora_id);
                  return (
                    <div key={c.id} className="row" style={{justifyContent:"space-between",gap:10,padding:"9px 12px",border:"1px solid var(--line)",borderRadius:"var(--radius-sm)",borderLeft:`3px solid ${t.raw}`}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:14}}>{c.hora_inicio?c.hora_inicio+" · ":""}{c.usuaria}</div>
                        <div className="tiny muted" style={{marginTop:2}}>
                          <span className="dot" style={{display:"inline-block",background:t.color,marginRight:5}}></span>{t.nombre}
                          {c.servicio? " · "+svcById(c.servicio).label : ""}{c.nota? " · "+c.nota : ""}
                        </div>
                      </div>
                      <button className="btn btn-sm btn-ghost btn-danger" title="Eliminar" onClick={()=>{if(confirm(`¿Eliminar la cita de ${c.usuaria}?`)) onDel(c.id);}}>✕</button>
                    </div>
                  );
                })}
              </div>}
          <button className="btn btn-primary" style={{width:"100%"}} onClick={()=>onAdd(fecha)}>+ Añadir cita a este día</button>
        </div>
      </div>
    </div>
  );
}

            <div className="field"><label>Hora</label><input type="time" value={f.hora_inicio} onChange={e=>set("hora_inicio",e.target.value)} /></div>

          <div className="field" style={{marginBottom:20}}>
            <label>Nota (opcional)</label>

          <div className="row" style={{justifyContent:"flex-end"}}>
            <button className="btn" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" disabled={!f.usuaria.trim()} onClick={()=>onSave(f)}>Guardar cita</button>
          </div>
        </div>
      </div>

  );

/* ════════════════════════ SERVICIOS ════════════════════════ */
function Servicios({ data, addUsuaria, addSesion, updSesion, delSesion, updUsuaria, addAyuda, delAyuda, updAyuda, delUsuaria }){
  const [sel,setSel]=useState(null);
  const [nuevaU,setNuevaU]=useState("");
  const [orden,setOrden]=useState("nombre");
  const [busca,setBusca]=useState("");
  const [pagina,setPagina]=useState(0);
  const usuaria=data.usuarias.find(u=>u.id===sel);
  const PORPAG=10;

  const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

  async function eliminarUsuaria(id){ await delUsuaria(id); setSel(null); }

  const horasDe = (uid, tipo) => data.sesiones
    .filter(s=>s.usuaria_id===uid && s.tipo===tipo)
    .reduce((a,s)=>a+Number(s.horas||0),0);

  const filtradas = [...data.usuarias]
    .filter(u=>norm(u.nombre).includes(norm(busca)))
    .sort((a,b)=>{
      if(orden==="nombre") return (a.nombre||"").localeCompare(b.nombre||"");
      return horasDe(b.id,orden) - horasDe(a.id,orden);
    });

  const totalPag = Math.max(1, Math.ceil(filtradas.length/PORPAG));
  const pag = Math.min(pagina, totalPag-1);
  const visibles = filtradas.slice(pag*PORPAG, pag*PORPAG+PORPAG);

  async function crearUsuaria(){
    const nombre=nuevaU.trim(); if(!nombre) return;
    const id=await addUsuaria(nombre); setNuevaU(""); if(id) setSel(id);
  }

  return (
    <div className="sidebar-cols">
      {/* barra lateral: buscar, ordenar, añadir */}
      <div className="card card-pad">
        <div className="field" style={{marginBottom:16}}>
          <label>🔍 Buscar usuaria</label>
          <input value={busca} onChange={e=>{setBusca(e.target.value); setPagina(0);}} placeholder="Escribe un nombre…" />
        </div>
        <div className="field" style={{marginBottom:16}}>
          <label>Ordenar por</label>
          <select value={orden} onChange={e=>{setOrden(e.target.value); setPagina(0);}}>
            <option value="nombre">Nombre (A–Z)</option>
            <option value="orientacion">Horas de orientación (mayor→menor)</option>
            <option value="formacion">Horas de formación (mayor→menor)</option>
            <option value="acogida">Horas de acogida (mayor→menor)</option>
          </select>
        </div>
        <div style={{borderTop:"1px solid var(--line)",paddingTop:16}}>
          <div className="field">
            <label>Añadir usuaria</label>
            <input value={nuevaU} onChange={e=>setNuevaU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&crearUsuaria()} placeholder="iniciales o código" />
          </div>
          <button className="btn btn-primary btn-sm" style={{marginTop:9,width:"100%"}} onClick={crearUsuaria}>+ Añadir</button>
        </div>
      </div>

      {/* panel central */}
      <div>
        {usuaria
          ? <div>
              <button className="btn btn-sm" style={{marginBottom:14}} onClick={()=>setSel(null)}>← Volver al listado</button>
              <DetalleUsuaria usuaria={usuaria}
                sesiones={data.sesiones.filter(s=>s.usuaria_id===usuaria.id)}
                ayudas={data.ayudas.filter(a=>a.usuaria_id===usuaria.id)}
                addSesion={addSesion} updSesion={updSesion} delSesion={delSesion}
                updUsuaria={updUsuaria} addAyuda={addAyuda} delAyuda={delAyuda} updAyuda={updAyuda}
                onDeleteUsuaria={eliminarUsuaria} />
            </div>
          : <div className="card card-pad">
              <div className="spread" style={{marginBottom:12}}>
                <h3 style={{fontSize:15}}>Usuarias <span className="muted" style={{fontWeight:400}}>({filtradas.length})</span></h3>
              </div>
              {filtradas.length===0
                ? <p className="small muted" style={{padding:"20px 0"}}>{data.usuarias.length===0?"Aún no hay usuarias. Añade la primera en la barra de la izquierda.":"No hay ninguna usuaria que coincida con la búsqueda."}</p>
                : <div className="usuaria-list">
                    {visibles.map(u=>(
                      <button key={u.id} className="usuaria-btn" onClick={()=>setSel(u.id)}>
                        <span className="nm">{u.nombre}</span>
                        <div className="tiny muted" style={{marginTop:3}}>
                          Ac {horasDe(u.id,"acogida")} · Or {horasDe(u.id,"orientacion")} · Fo {horasDe(u.id,"formacion")} h
                        </div>
                      </button>
                    ))}
                  </div>}
              {totalPag>1 &&
                <div className="spread" style={{marginTop:16,borderTop:"1px solid var(--line)",paddingTop:14}}>
                  <button className="btn btn-sm" disabled={pag===0} onClick={()=>setPagina(pag-1)}>‹ Anterior</button>
                  <span className="small muted">Página {pag+1} de {totalPag}</span>
                  <button className="btn btn-sm" disabled={pag>=totalPag-1} onClick={()=>setPagina(pag+1)}>Siguiente ›</button>
                </div>}
            </div>}
      </div>
    </div>
  );
}

function DetalleUsuaria({ usuaria, sesiones, ayudas, addSesion, updSesion, delSesion, updUsuaria, addAyuda, delAyuda, updAyuda, onDeleteUsuaria }){
  const [modal,setModal]=useState(null); // sesión {tipo, sesion?}
  const [modalAyuda,setModalAyuda]=useState(null); // ayuda {tipo, ayuda?}
  return (
    <div>
      <div className="card card-pad" style={{marginBottom:18}}>
        <div className="spread">
          <div>
            <h2 style={{fontSize:21}}>{usuaria.nombre}</h2>
            <p className="small muted" style={{marginTop:2}}>Ficha, horas por servicio y becas.</p>
          </div>
          <button className="btn btn-sm btn-ghost btn-danger"
            onClick={()=>{ if(confirm(`¿Eliminar a "${usuaria.nombre}" y todos sus datos (horas, becas)? Esta acción no se puede deshacer.`)) onDeleteUsuaria(usuaria.id); }}>
            Eliminar usuaria
          </button>
        </div>
      </div>

      <Ficha key={usuaria.id} usuaria={usuaria} updUsuaria={updUsuaria} />

      {SERVICIOS.map(svc=>{
        const sess=sesiones.filter(s=>s.tipo===svc.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
        const total=sess.reduce((a,s)=>a+Number(s.horas||0),0);
        const facturado=sess.filter(s=>s.facturado).reduce((a,s)=>a+Number(s.horas||0),0);
        const pendiente=total-facturado;
        const eurFacturado=sess.filter(s=>s.facturado).reduce((a,s)=>a+Number(s.horas||0)*Number(s.tarifa||0),0);
        const eurPendiente=sess.filter(s=>!s.facturado).reduce((a,s)=>a+Number(s.horas||0)*Number(s.tarifa||0),0);
        const pct=Math.min(100,(total/svc.max)*100);
        const restante=Math.max(0,svc.max-total);
        const color = pct>=100 ? "var(--danger)" : pct>=80 ? "var(--warn)" : "var(--accent)";
        return (
          <div key={svc.id} className="svc">
            <div className="svc-head" style={{background:"var(--paper)"}}>
              <div style={{flex:"1 1 260px",minWidth:240}}>
                <div className="spread">
                  <span className="svc-name">{svc.label}</span>
                  <span className="tiny muted">{total} / {svc.max} h · quedan {restante} h</span>
                </div>
                <div className="meter"><div style={{width:pct+"%",background:color}}></div></div>
              </div>
              <div className="svc-stats">
                <div><div className="tiny muted">Total</div><b>{total} h</b></div>
                <div><div className="tiny muted">Facturado</div><b style={{color:"var(--ok)"}}>{facturado} h</b></div>
                <div><div className="tiny muted">Sin facturar</div><b style={{color:pendiente>0?"var(--warn)":"var(--ink-soft)"}}>{pendiente} h</b></div>
                <div style={{borderLeft:"1px solid var(--line)",paddingLeft:18}}><div className="tiny muted">€ facturado</div><b style={{color:"var(--ok)"}}>{fmtEur(eurFacturado)}</b></div>
                <div><div className="tiny muted">€ pendiente</div><b style={{color:eurPendiente>0?"var(--warn)":"var(--ink-soft)"}}>{fmtEur(eurPendiente)}</b></div>
              </div>
              <button className="btn btn-sm" onClick={()=>setModal({tipo:svc.id})}>+ Sesión</button>
            </div>

            {sess.length>0 &&
              <table className="sess">
                <thead><tr><th>Fecha</th><th>Horas</th><th>Importe</th><th>Trabajadora</th><th>Facturado</th><th>Mes facturación</th><th>Doc. STO</th><th></th></tr></thead>
                <tbody>
                  {sess.map(s=>{
                    const t=traById(s.trabajadora_id);
                    return (
                      <tr key={s.id}>
                        <td>{fmtFecha(s.fecha)}</td>
                        <td><b>{s.horas} h</b></td>
                        <td><b>{fmtEur(Number(s.horas||0)*Number(s.tarifa||0))}</b><div className="tiny muted">{fmtEur(s.tarifa)}/h</div></td>
                        <td><span className="dot" style={{display:"inline-block",background:t.color,marginRight:6}}></span>{t.nombre}</td>
                        <td>
                          {s.facturado
                            ? <span className="pill pill-yes">Sí · {fmtFecha(s.fecha_facturacion)}</span>
                            : <span className="pill pill-no">No</span>}
                        </td>
                        <td className="small muted" style={{textTransform:"capitalize"}}>{s.facturado?mesAnio(s.fecha_facturacion):"sin facturar"}</td>
                        <td>
                          {s.doc_subida
                            ? <span className="pill pill-yes">Sí · {fmtFecha(s.doc_fecha)}</span>
                            : <button className="btn btn-sm" onClick={()=>{const d=prompt("Fecha de subida a STO (DD/MM/AAAA):",fmtFecha(hoyStr())); if(d){const p=d.split("/"); if(p.length===3) updSesion(s.id,{doc_subida:true,doc_fecha:`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`});}}}>Marcar</button>}
                        </td>
                        <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
                          {!s.facturado
                            ? <button className="btn btn-sm" onClick={()=>{const fac=prompt("Fecha de facturación (DD/MM/AAAA):",fmtFecha(hoyStr())); if(fac){const p=fac.split("/"); if(p.length===3) updSesion(s.id,{facturado:true,fecha_facturacion:`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`});}}}>Facturar</button>
                            : <button className="btn btn-sm btn-ghost" onClick={()=>updSesion(s.id,{facturado:false,fecha_facturacion:null})}>Desmarcar</button>}
                          <button className="btn btn-sm btn-ghost" title="Editar" onClick={()=>setModal({tipo:svc.id, sesion:s})}>✎</button>
                          <button className="btn btn-sm btn-ghost btn-danger" title="Eliminar" onClick={()=>{if(confirm("¿Eliminar esta sesión?")) delSesion(s.id);}}>✕</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>}
          </div>
        );
      })}

      <div style={{margin:"22px 0 10px"}}><h3 style={{fontSize:16}}>Becas y ayudas económicas</h3></div>
      {BECAS.map(beca=>{
        const items = ayudas.filter(a=>a.tipo===beca.id).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
        const total = items.reduce((a,x)=>a+Number(x.importe||0),0);
        return (
          <div key={beca.id} className="svc">
            <div className="svc-head" style={{background:"var(--paper)"}}>
              <span className="svc-name">{beca.label}</span>
              <div className="svc-stats"><div><div className="tiny muted">Total entregado</div><b>{fmtEur(total)}</b></div></div>
              <button className="btn btn-sm" onClick={()=>setModalAyuda({tipo:beca.id})}>+ Añadir</button>
            </div>
            {items.length>0 &&
              <table className="sess">
                <thead><tr><th>Fecha</th><th>Concepto</th><th>Importe</th><th>Facturado</th><th>Doc. STO</th><th></th></tr></thead>
                <tbody>
                  {items.map(x=>(
                    <tr key={x.id}>
                      <td>{fmtFecha(x.fecha)}</td>
                      <td>{x.concepto||"—"}</td>
                      <td><b>{fmtEur(x.importe)}</b></td>
                      <td>
                        {x.facturado
                          ? <button className="btn btn-sm btn-ghost" title="Quitar facturación" onClick={()=>updAyuda(x.id,{facturado:false,fecha_facturacion:null})}><span className="pill pill-yes">Sí · {fmtFecha(x.fecha_facturacion)}</span></button>
                          : <button className="btn btn-sm" onClick={()=>{const fac=prompt("Fecha de facturación (DD/MM/AAAA):",fmtFecha(hoyStr())); if(fac){const p=fac.split("/"); if(p.length===3) updAyuda(x.id,{facturado:true,fecha_facturacion:`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`});}}}>Facturar</button>}
                      </td>
                      <td>
                        {x.doc_subida
                          ? <button className="btn btn-sm btn-ghost" title="Quitar doc." onClick={()=>updAyuda(x.id,{doc_subida:false,doc_fecha:null})}><span className="pill pill-yes">Sí · {fmtFecha(x.doc_fecha)}</span></button>
                          : <button className="btn btn-sm" onClick={()=>{const d=prompt("Fecha de subida a STO (DD/MM/AAAA):",fmtFecha(hoyStr())); if(d){const p=d.split("/"); if(p.length===3) updAyuda(x.id,{doc_subida:true,doc_fecha:`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`});}}}>Marcar</button>}
                      </td>
                      <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
                        <button className="btn btn-sm btn-ghost" title="Editar" onClick={()=>setModalAyuda({tipo:beca.id, ayuda:x})}>✎</button>
                        <button className="btn btn-sm btn-ghost btn-danger" title="Eliminar" onClick={()=>{if(confirm("¿Eliminar este registro?")) delAyuda(x.id);}}>✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>}
          </div>
        );
      })}

      {modal && <ModalSesion tipo={modal.tipo} usuaria_id={usuaria.id} inicial={modal.sesion} onClose={()=>setModal(null)}
                   onSave={(s)=>{ modal.sesion ? updSesion(modal.sesion.id, s) : addSesion(s); setModal(null);}} />}
      {modalAyuda && <ModalAyuda beca={becaById(modalAyuda.tipo)} usuaria_id={usuaria.id} inicial={modalAyuda.ayuda} onClose={()=>setModalAyuda(null)}
                   onSave={(a)=>{ modalAyuda.ayuda ? updAyuda(modalAyuda.ayuda.id, a) : addAyuda(a); setModalAyuda(null);}} />}
    </div>
  );
}

function Ficha({ usuaria, updUsuaria }){
  const [f,setF]=useState({
    numero_cuenta: usuaria.numero_cuenta||"",
    discapacidad: !!usuaria.discapacidad,
    trabajando: !!usuaria.trabajando,
    trabajo_donde: usuaria.trabajo_donde||"",
    observaciones: usuaria.observaciones||"",
  });
  const [guardado,setGuardado]=useState(false);
  const set=(k,v)=>{ setF(s=>({...s,[k]:v})); setGuardado(false); };
  function guardar(){
    updUsuaria(usuaria.id,{
      numero_cuenta:f.numero_cuenta||null,
      discapacidad:f.discapacidad,
      trabajando:f.trabajando,
      trabajo_donde:f.trabajando?(f.trabajo_donde||null):null,
      observaciones:f.observaciones||null,
    });
    setGuardado(true);
  }
  return (
    <div className="card card-pad" style={{marginBottom:18}}>
      <div className="spread" style={{marginBottom:14}}>
        <h3 style={{fontSize:16}}>Ficha de la usuaria</h3>
        <div className="row" style={{gap:10}}>
          {guardado && <span className="tiny" style={{color:"var(--ok)",fontWeight:700}}>Guardado ✓</span>}
          <button className="btn btn-primary btn-sm" onClick={guardar}>Guardar ficha</button>
        </div>
      </div>
      <div className="ficha-grid">
        <div className="field">
          <label>Número de cuenta</label>
          <input value={f.numero_cuenta} onChange={e=>set("numero_cuenta",e.target.value)} placeholder="ES.." />
        </div>
        <div className="checkline" style={{alignSelf:"end",paddingBottom:9}}>
          <input type="checkbox" id="disc" checked={f.discapacidad} onChange={e=>set("discapacidad",e.target.checked)} />
          <label htmlFor="disc" style={{fontWeight:600}}>Discapacidad reconocida</label>
        </div>
      </div>
      <div className="checkline" style={{margin:"6px 0 10px"}}>
        <input type="checkbox" id="trab" checked={f.trabajando} onChange={e=>set("trabajando",e.target.checked)} />
        <label htmlFor="trab" style={{fontWeight:600}}>Inserción laboral · está trabajando</label>
      </div>
      {f.trabajando &&
        <div className="field" style={{marginBottom:12}}>
          <label>¿Dónde? (empresa, puesto, jornada…)</label>
          <textarea rows="2" value={f.trabajo_donde} onChange={e=>set("trabajo_donde",e.target.value)} />
        </div>}
      <div className="field">
        <label>Observaciones</label>
        <textarea rows="3" value={f.observaciones} onChange={e=>set("observaciones",e.target.value)} placeholder="Algo a tener en cuenta sobre esta usuaria" />
      </div>
    </div>
  );
}

function ModalSesion({ tipo, usuaria_id, inicial, onClose, onSave }){
  const svc=svcById(tipo);
  const editando=!!inicial;
  const [f,setF]=useState(inicial
    ? { usuaria_id, tipo, trabajadora_id:inicial.trabajadora_id, horas:inicial.horas, tarifa:inicial.tarifa, fecha:inicial.fecha, facturado:!!inicial.facturado, fecha_facturacion:inicial.fecha_facturacion||"", doc_subida:!!inicial.doc_subida, doc_fecha:inicial.doc_fecha||"" }
    : { usuaria_id, tipo, trabajadora_id:"mar", horas:1, tarifa:svc.tarifa, fecha:hoyStr(), facturado:false, fecha_facturacion:"", doc_subida:false, doc_fecha:"" });
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  function guardar(){
    onSave({
      usuaria_id:f.usuaria_id, tipo:f.tipo, trabajadora_id:f.trabajadora_id,
      horas:Number(f.horas), tarifa:Number(f.tarifa), fecha:f.fecha,
      facturado:f.facturado, fecha_facturacion:f.facturado?(f.fecha_facturacion||null):null,
      doc_subida:f.doc_subida, doc_fecha:f.doc_subida?(f.doc_fecha||null):null,
    });
  }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h2 style={{fontSize:18}}>{editando?"Editar sesión":"Nueva sesión"} · {svc.label}</h2><button className="btn-ghost btn" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="grid2" style={{marginBottom:13}}>
            <div className="field"><label>Horas</label><input type="number" min="0.5" step="0.5" value={f.horas} onChange={e=>set("horas",e.target.value)} /></div>
            <div className="field"><label>Fecha</label><input type="date" value={f.fecha} onChange={e=>set("fecha",e.target.value)} /></div>
          </div>
          <div className="field" style={{marginBottom:6}}>
            <label>Tarifa (€/hora)</label>
            <input type="number" min="0" step="0.5" value={f.tarifa} onChange={e=>set("tarifa",e.target.value)} />
          </div>
          <p className="tiny muted" style={{marginBottom:14}}>Importe: <b style={{color:"var(--ink)"}}>{fmtEur(Number(f.horas||0)*Number(f.tarifa||0))}</b></p>
          <div className="field" style={{marginBottom:14}}>
            <label>Trabajadora</label>
            <select value={f.trabajadora_id} onChange={e=>set("trabajadora_id",e.target.value)}>
              {TRABAJADORAS.map(t=><option key={t.id} value={t.id}>{t.nombre}</option>)}
            </select>
          </div>
          <div className="checkline" style={{marginBottom:13}}>
            <input type="checkbox" id="fac" checked={f.facturado} onChange={e=>set("facturado",e.target.checked)} />
            <label htmlFor="fac" style={{fontWeight:600}}>Ya facturado</label>
          </div>
          {f.facturado &&
            <div className="field" style={{marginBottom:18}}>
              <label>Fecha de facturación</label>
              <input type="date" value={f.fecha_facturacion} onChange={e=>set("fecha_facturacion",e.target.value)} />
            </div>}
          <div className="checkline" style={{marginBottom:13,borderTop:"1px solid var(--line)",paddingTop:14}}>
            <input type="checkbox" id="doc" checked={f.doc_subida} onChange={e=>set("doc_subida",e.target.checked)} />
            <label htmlFor="doc" style={{fontWeight:600}}>Documentación subida a STO</label>
          </div>
          {f.doc_subida &&
            <div className="field" style={{marginBottom:18}}>
              <label>Fecha de subida a STO</label>
              <input type="date" value={f.doc_fecha} onChange={e=>set("doc_fecha",e.target.value)} />
            </div>}
          <div className="row" style={{justifyContent:"flex-end",marginTop:8}}>
            <button className="btn" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" disabled={!f.horas||Number(f.horas)<=0} onClick={guardar}>{editando?"Guardar cambios":"Guardar sesión"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ModalAyuda({ beca, usuaria_id, inicial, onClose, onSave }){

    ? { usuaria_id, tipo:beca.id, concepto:inicial.concepto||"", importe:inicial.importe??"", fecha:inicial.fecha||hoyStr(), facturado:!!inicial.facturado, fecha_facturacion:inicial.fecha_facturacion||"", doc_subida:!!inicial.doc_subida, doc_fecha:inicial.doc_fecha||"" }
    : { usuaria_id, tipo:beca.id, concepto:"", importe:"", fecha:hoyStr(), facturado:false, fecha_facturacion:"", doc_subida:false, doc_fecha:"" });
  const set=(k,v)=>setF(s=>({...s,[k]:v}));

      usuaria_id:f.usuaria_id, tipo:f.tipo, concepto:f.concepto||null, importe:Number(f.importe)||0, fecha:f.fecha,
      facturado:f.facturado, fecha_facturacion:f.facturado?(f.fecha_facturacion||null):null,

        <div className="modal-body">
          <div className="field" style={{marginBottom:13}}>
            <label>Concepto</label>
            <input value={f.concepto} onChange={e=>set("concepto",e.target.value)} placeholder={beca.ph} />
          </div>
          <div className="grid2" style={{marginBottom:14}}>
            <div className="field"><label>Importe (€)</label><input type="number" min="0" step="0.01" value={f.importe} onChange={e=>set("importe",e.target.value)} /></div>
            <div className="field"><label>Fecha</label><input type="date" value={f.fecha} onChange={e=>set("fecha",e.target.value)} /></div>
          </div>
          <div className="checkline" style={{marginBottom:13}}>
            <input type="checkbox" id="facA" checked={f.facturado} onChange={e=>set("facturado",e.target.checked)} />
            <label htmlFor="facA" style={{fontWeight:600}}>Ya facturado</label>
          </div>
          {f.facturado &&
            <div className="field" style={{marginBottom:14}}>
              <label>Fecha de facturación</label>
              <input type="date" value={f.fecha_facturacion} onChange={e=>set("fecha_facturacion",e.target.value)} />
            </div>}
          <div className="checkline" style={{marginBottom:13,borderTop:"1px solid var(--line)",paddingTop:14}}>
            <input type="checkbox" id="docA" checked={f.doc_subida} onChange={e=>set("doc_subida",e.target.checked)} />

          {f.doc_subida &&
            <div className="field" style={{marginBottom:18}}>
              <label>Fecha de subida a STO</label>
              <input type="date" value={f.doc_fecha} onChange={e=>set("doc_fecha",e.target.value)} />
            </div>}
          <div className="row" style={{justifyContent:"flex-end"}}>
            <button className="btn" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={guardar}>{editando?"Guardar cambios":"Guardar"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ RESUMEN / CUADRO DE MANDO ════════════════════════ */
function Resumen({ data }){
  const { sesiones } = data;
  const [ver,setVer]=useState({fac:true,pen:true});

  const importe = s => Number(s.horas||0)*Number(s.tarifa||0);
  const totalHoras = sesiones.reduce((a,s)=>a+Number(s.horas||0),0);
  const eurFacturado = sesiones.filter(s=>s.facturado).reduce((a,s)=>a+importe(s),0);
  const eurPendiente = sesiones.filter(s=>!s.facturado).reduce((a,s)=>a+importe(s),0);
  const mujeres = new Set(sesiones.map(s=>s.usuaria_id)).size;

  const porServicio = SERVICIOS.map(svc=>{
    const ss=sesiones.filter(s=>s.tipo===svc.id);
    const fac=ss.filter(s=>s.facturado).reduce((a,s)=>a+Number(s.horas||0),0);
    const pen=ss.filter(s=>!s.facturado).reduce((a,s)=>a+Number(s.horas||0),0);
    return {svc, fac, pen, total:fac+pen};
  });
  const maxServ = Math.max(1, ...porServicio.map(p=>(ver.fac?p.fac:0)+(ver.pen?p.pen:0)));

  const porTrab = TRABAJADORAS.map(t=>({
    t, h: sesiones.filter(s=>s.trabajadora_id===t.id).reduce((a,s)=>a+Number(s.horas||0),0)
  }));
  const maxTrab = Math.max(1, ...porTrab.map(p=>p.h));

  const mesMap={};
  sesiones.filter(s=>s.facturado && s.fecha_facturacion).forEach(s=>{
    const k=s.fecha_facturacion.slice(0,7);
    mesMap[k]=(mesMap[k]||0)+importe(s);
  });
  const meses=Object.keys(mesMap).sort();
  const maxMes=Math.max(1, ...meses.map(k=>mesMap[k]));
  const arrMes=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const mesCorto = k => { const [y,m]=k.split("-"); return `${arrMes[+m-1]} ${y.slice(2)}`; };

  return (
    <div>
      <div className="kpis">
        <div className="kpi"><div className="label">Mujeres atendidas</div><div className="val">{mujeres}</div><div className="accent-bar" style={{background:"var(--accent)"}}></div></div>
        <div className="kpi"><div className="label">Horas totales</div><div className="val">{totalHoras} h</div><div className="accent-bar" style={{background:"var(--c-vic)"}}></div></div>
        <div className="kpi"><div className="label">€ facturado</div><div className="val" style={{color:"var(--ok)"}}>{fmtEur(eurFacturado)}</div><div className="accent-bar" style={{background:"var(--ok)"}}></div></div>
        <div className="kpi"><div className="label">€ pendiente</div><div className="val" style={{color:"var(--warn)"}}>{fmtEur(eurPendiente)}</div><div className="accent-bar" style={{background:"var(--warn)"}}></div></div>
      </div>

      <div className="chart-card">
        <h3>Horas por servicio</h3>
        <p className="small muted">Reparto entre horas ya facturadas y pendientes. Pulsa la leyenda para filtrar.</p>
        <div style={{marginTop:14}}>
          {porServicio.map(({svc,fac,pen,total})=>(
            <div className="hbar-row" key={svc.id}>
              <div className="hbar-label">{svc.label}</div>
              <div className="hbar-track">
                {ver.fac && fac>0 &&
                  <div className="hbar-seg tip-host" style={{width:(fac/maxServ*100)+"%",background:"var(--ok)"}}>
                    <span className="tip">{fac} h facturadas</span>
                  </div>}
                {ver.pen && pen>0 &&
                  <div className="hbar-seg tip-host" style={{width:(pen/maxServ*100)+"%",background:"var(--warn)"}}>
                    <span className="tip">{pen} h sin facturar</span>
                  </div>}
              </div>
              <div className="hbar-val"><b>{(ver.fac?fac:0)+(ver.pen?pen:0)} h</b></div>
            </div>
          ))}
        </div>
        <div className="legend-toggle">
          <div className="lt" style={{opacity:ver.fac?1:.4}} onClick={()=>setVer(v=>({...v,fac:!v.fac}))}>
            <span className="sq" style={{background:"var(--ok)"}}></span>Facturadas
          </div>
          <div className="lt" style={{opacity:ver.pen?1:.4}} onClick={()=>setVer(v=>({...v,pen:!v.pen}))}>
            <span className="sq" style={{background:"var(--warn)"}}></span>Sin facturar
          </div>
        </div>
      </div>

      <div className="dash-cols">
        <div className="chart-card">
          <h3>Facturación por mes</h3>
          <p className="small muted">Importe facturado según su fecha de facturación.</p>
          <div className="vbars" style={{marginTop:8}}>
            {meses.length===0
              ? <p className="small muted">Aún no hay facturación registrada.</p>
              : meses.map(k=>(
                <div className="vbar-col" key={k}>
                  <div className="vbar tip-host" style={{height:(mesMap[k]/maxMes*120+3)+"px"}}>
                    <span className="tip">{fmtEur(mesMap[k])}</span>
                  </div>
                  <span className="vbar-x">{mesCorto(k)}</span>
                </div>
              ))}
          </div>
        </div>

        <div className="chart-card">
          <h3>Horas por trabajadora</h3>
          <p className="small muted">Carga de trabajo de cada una.</p>
          <div style={{marginTop:14}}>
            {porTrab.map(({t,h})=>(
              <div className="hbar-row" key={t.id}>
                <div className="hbar-label">{t.nombre}</div>
                <div className="hbar-track">
                  <div className="hbar-seg tip-host" style={{width:(h/maxTrab*100)+"%",background:t.color}}>
                    <span className="tip">{h} h</span>
                  </div>
                </div>
                <div className="hbar-val"><b>{h} h</b></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
